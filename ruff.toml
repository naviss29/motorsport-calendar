line-length = 100
target-version = "py312"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "RUF",  # ruff-specific rules
    "SIM",  # flake8-simplify
    "ANN",  # flake8-annotations
    "PTH",  # flake8-use-pathlib
]
ignore = [
    "ANN101",  # Missing type annotation for self
    "ANN102",  # Missing type annotation for cls
    "ANN401",  # Dynamically typed expressions (Any)
]

[lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "S101"]
# Layout System components (Sprint 31) are named like widgets (PageContainer,
# PageHeader, ...), matching the Flet/Flutter-style naming used at their call
# sites across every view — deliberate, not an oversight.
"motorsport_calendar/gui/components/layout/*.py" = ["N802"]

[lint.isort]
known-first-party = ["motorsport_calendar"]
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
